<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LokanStore - حاسبة الطلبات</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        header { background-color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #005696; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; font-size: 20pt; color: #005696; }
        
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        
        .option-group { margin-bottom: 20px; }
        .option-title { font-weight: bold; display: block; margin-bottom: 10px; color: #005696; border-right: 4px solid #005696; padding-right: 10px; }
        
        /* تصميم أزرار المقاسات */
        .size-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .size-card { border: 2px solid #ddd; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .size-card.active { background-color: #005696; color: white; border-color: #005696; }

        select, input[type="checkbox"] { cursor: pointer; }
        .custom-select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 11pt; font-family: 'Cairo'; }
        
        .extra-options { background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 10.5pt; }
        .checkbox-item input { margin-left: 10px; transform: scale(1.2); }

        .total-section { background: #005696; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .total-price { font-size: 24pt; font-weight: bold; display: block; }
        .unit-price-label { font-size: 10pt; opacity: 0.9; }

        .btn-order { background-color: #25d366; color: white; padding: 15px; border: none; border-radius: 50px; font-weight: bold; font-size: 14pt; cursor: pointer; width: 100%; margin-top: 15px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        
        .footer-info { text-align: center; font-size: 9pt; color: #777; margin-top: 20px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">LokanStore <span style="font-size: 12pt;">LS</span></div>
        <div>🛒</div>
    </header>

    <div class="container">
        <h2 style="text-align: center; color: #005696;">طلب أكياس مخصصة</h2>

        <div class="option-group">
            <span class="option-title">1. اختر المقاس (سم)</span>
            <div class="size-grid" id="sizeGrid">
                <div class="size-card active" data-size="20x30">20 × 30</div>
                <div class="size-card" data-size="30x40">30 × 40</div>
                <div class="size-card" data-size="40x50">40 × 50</div>
                <div class="size-card" data-size="50x60">50 × 60</div>
            </div>
        </div>

        <div class="option-group">
            <span class="option-title">2. الكمية (قطعة)</span>
            <select class="custom-select" id="quantitySelect">
                <option value="100">100 قطعة</option>
                <option value="300">300 قطعة</option>
                <option value="500">500 قطعة</option>
                <option value="1000" selected>1000 قطعة (أفضل سعر)</option>
            </select>
        </div>

        <div class="option-group">
            <span class="option-title">3. لون الكيس</span>
            <select class="custom-select" id="colorSelect">
                <option value="white">أبيض</option>
                <option value="black">أسود</option>
                <option value="pink">وردي</option>
            </select>
        </div>

        <div class="option-group">
            <span class="option-title">4. خيارات إضافية للطباعة</span>
            <div class="extra-options">
                <label class="checkbox-item">
                    <input type="checkbox" class="extra-calc" id="goldPrint" data-extra="2"> طباعة لون ذهبي (+2 د.ج)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" class="extra-calc" id="doubleSide" data-extra="10"> طباعة على الوجهين (+10 د.ج)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" class="extra-calc" id="multiColor" data-extra="10"> طباعة أكثر من لون (+10 د.ج)
                </label>
            </div>
        </div>

        <div class="total-section">
            <span class="unit-price-label">سعر القطعة الواحدة: <span id="unitPriceDisplay">0</span> د.ج</span>
            <span class="total-price" id="totalPriceDisplay">0 د.ج</span>
            <small>التوصيل متوفر لـ 58 ولاية 🚚</small>
        </div>

        <button class="btn-order" onclick="sendOrder()">اطلب عبر واتساب ✅</button>
        
        <div class="footer-info">
            LokanStore - Bir Ghbalou - Bouira<br>
            جودة عالية • سعر المصنع • احترافية
        </div>
    </div>

    <script>
        // بيانات الأسعار من الصورة الثانية
        const priceList = {
            "20x30": { 100: 30, 300: 24, 500: 22, 1000: 20 },
            "30x40": { 100: 35, 300: 27, 500: 25, 1000: 23 },
            "40x50": { 100: 40, 300: 31, 500: 29, 1000: 27 },
            "50x60": { 100: 45, 300: 37, 500: 35, 1000: 33 }
        };

        let currentSize = "20x30";

        // التعامل مع اختيار المقاس
        const sizeCards = document.querySelectorAll('.size-card');
        sizeCards.forEach(card => {
            card.addEventListener('click', function() {
                sizeCards.forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentSize = this.getAttribute('data-size');
                calculateTotal();
            });
        });

        // المستمعات لبقية المدخلات
        document.getElementById('quantitySelect').addEventListener('change', calculateTotal);
        document.querySelectorAll('.extra-calc').forEach(item => {
            item.addEventListener('change', calculateTotal);
        });

        function calculateTotal() {
            const qty = parseInt(document.getElementById('quantitySelect').value);
            
            // الحصول على السعر الأساسي من الجدول
            let basePrice = priceList[currentSize][qty] || 20;

            // إضافة تكاليف الإضافات
            let extraCost = 0;
            document.querySelectorAll('.extra-calc:checked').forEach(item => {
                extraCost += parseInt(item.getAttribute('data-extra'));
            });

            const finalUnitPrice = basePrice + extraCost;
            const finalTotal = finalUnitPrice * qty;

            // تحديث العرض في الصفحة
            document.getElementById('unitPriceDisplay').innerText = finalUnitPrice;
            document.getElementById('totalPriceDisplay').innerText = finalTotal.toLocaleString() + " د.ج";
        }

        function sendOrder() {
            const qty = document.getElementById('quantitySelect').value;
            const color = document.getElementById('colorSelect').options[document.getElementById('colorSelect').selectedIndex].text;
            const total = document.getElementById('totalPriceDisplay').innerText;
            
            const message = `مرحباً LokanStore، أريد طلب أكياس:\n- المقاس: ${currentSize}\n- الكمية: ${qty}\n- اللون: ${color}\n- الإجمالي: ${total}`;
            const whatsappUrl = `https://wa.me/213551976603?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappUrl, '_blank');
        }

        // تشغيل الحساب لأول مرة عند تحميل الصفحة
        calculateTotal();
    </script>
</body>
</html>
